backend:
  replicaCount: 1
  image:
    tag: "{{ env \"GIT_SHA\" }}"
  resources:
    limits:
      cpu: "250m"
      memory: "256Mi"
    requests:
      cpu: "125m"
      memory: "128Mi"
  service:
    port: 8000
    targetPort: 8000

frontend:
  replicaCount: 1
  image:
    tag: "{{ env \"GIT_SHA\" }}"
  resources:
    limits:
      cpu: "250m"
      memory: "256Mi"
    requests:
      cpu: "125m"
      memory: "128Mi"
  service:
    port: 3000
    targetPort: 3000

ingress:
  enabled: false  # No public ingress for dev