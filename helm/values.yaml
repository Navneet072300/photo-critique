global:
  imageRegistry: ghcr.io
  imageRepository: Navneet072300/photo-critique

backend:
  replicaCount: 2
  image:
    repository: "{{ .Values.global.imageRegistry }}/{{ .Values.global.imageRepository }}/backend"
    tag: "latest"
  resources:
    limits:
      cpu: "500m"
      memory: "512Mi"
    requests:
      cpu: "250m"
      memory: "256Mi"
  service:
    port: 8000
    targetPort: 8000

frontend:
  replicaCount: 2
  image:
    repository: "{{ .Values.global.imageRegistry }}/{{ .Values.global.imageRepository }}/frontend"
    tag: "latest"
  resources:
    limits:
      cpu: "500m"
      memory: "512Mi"
    requests:
      cpu: "250m"
      memory: "256Mi"
  service:
    port: 3000
    targetPort: 3000

ingress:
  enabled: true
  hosts:
    - host: backend.example.com
      paths:
        - path: /
          pathType: ImplementationSpecific
    - host: frontend.example.com
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []  # TLS entries are commented out by default; enable after DNS