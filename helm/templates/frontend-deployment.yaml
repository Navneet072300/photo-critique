apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "photo-critique.fullname" . }}-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "photo-critique.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount.frontend }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/component: frontend
        {{- include "photo-critique.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "photo-critique.fullname" . }}-sa
      containers:
        - name: frontend
          image: "{{ .Values.image.frontend.repository }}:{{ .Values.image.frontend.tag }}"
          imagePullPolicy: {{ .Values.image.frontend.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.frontend.port }}
          envFrom:
            - configMapRef:
                name: {{ include "photo-critique.fullname" . }}-config
          resources:
            limits:
              cpu: "{{ .Values.resources.frontend.limits.cpu }}"
              memory: "{{ .Values.resources.frontend.limits.memory }}"
            requests:
              cpu: "{{ .Values.resources.frontend.requests.cpu }}"
              memory: "{{ .Values.resources.frontend.requests.memory }}"