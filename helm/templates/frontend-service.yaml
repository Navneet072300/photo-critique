apiVersion: v1
kind: Service
metadata:
  name: {{ include "photo-critique.fullname" . }}-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "photo-critique.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "photo-critique.selectorLabels" . | nindent 4 }}
    component: frontend
  ports:
    - name: http
      port: {{ .Values.frontend.service.port }}
      targetPort: {{ .Values.frontend.service.targetPort }}