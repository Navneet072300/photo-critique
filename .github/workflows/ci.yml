# Required secrets:
#   - GITHUB_TOKEN (automatically provided)
#   - ARGOCD_SERVER (e.g., https://argocd.mycompany.com)
#   - ARGOCD_TOKEN (ArgoCD authentication token with sync permission)

name: CI/CD Pipeline

on:
  push:
    branches: [dev, main]

env:
  REGISTRY: ghcr.io
  IMAGE_REPO: ghcr.io/Navneet072300/photo-critique
  GIT_SHA: ${{ github.sha }}

jobs:
  build-backend:
    name: Build & Push Backend Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        working-directory: backend
        run: |
          docker build -t ${{ env.IMAGE_REPO }}/backend:${{ env.GIT_SHA }} .

      - name: Push backend image
        run: |
          docker push ${{ env.IMAGE_REPO }}/backend:${{ env.GIT_SHA }}

  build-frontend:
    name: Build & Push Frontend Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build frontend image
        working-directory: frontend
        run: |
          docker build -t ${{ env.IMAGE_REPO }}/frontend:${{ env.GIT_SHA }} .

      - name: Push frontend image
        run: |
          docker push ${{ env.IMAGE_REPO }}/frontend:${{ env.GIT_SHA }}

  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.ref == 'refs/heads/dev'
    steps:
      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd https://github.com/argoproj/argo-cd/releases/download/v2.9.5/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      - name: Login to ArgoCD
        env:
          ARGOCD_OPTS: --insecure
        run: |
          argocd login ${{ secrets.ARGOCD_SERVER }} ${{ env.ARGOCD_OPTS }} --username admin --password ${{ secrets.ARGOCD_TOKEN }} --grpc-web

      - name: Sync Development Application
        run: |
          argocd app sync photo-critique-dev --grpc-web

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd https://github.com/argoproj/argo-cd/releases/download/v2.9.5/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      - name: Login to ArgoCD
        env:
          ARGOCD_OPTS: --insecure
        run: |
          argocd login ${{ secrets.ARGOCD_SERVER }} ${{ env.ARGOCD_OPTS }} --username admin --password ${{ secrets.ARGOCD_TOKEN }} --grpc-web

      - name: Sync Production Application
        run: |
          argocd app sync photo-critique-prod --grpc-web